name: Deploy to Sentinel

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SENTINEL_IP }}
          username: ${{ secrets.SENTINEL_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: /home/deploy/deploy.sh ${{ github.event.repository.name }}
